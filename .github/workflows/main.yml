name: Build CDI-NES Controller

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib \
            python3

      - name: Clone Pico SDK
        run: |
          git clone https://github.com/raspberrypi/pico-sdk.git --depth=1 --recurse-submodules
          echo "PICO_SDK_PATH=${{ github.workspace }}/pico-sdk" >> $GITHUB_ENV

      - name: Configure CMake
        run: cmake -B build -DCMAKE_VERBOSE_MAKEFILE=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: cdi_nes_controller-uf2
          path: build/cdi_nes_controller.uf2
          if-no-files-found: error

      - name: Upload ELF (debug)
        uses: actions/upload-artifact@v4
        with:
          name: cdi_nes_controller-elf
          path: build/cdi_nes_controller.elf
          if-no-files-found: warn
